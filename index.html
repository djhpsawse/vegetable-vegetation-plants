<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roots & Shoots Nursery</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f9f4;
      color: #2f4f2f;
    }

    header {
      background: #3a7d44;
      color: white;
      padding: 20px;
      text-align: center;
      position: relative;
    }

    #cartBtn {
      position: absolute;
      right: 20px;
      top: 20px;
      background: white;
      color: #2f4f2f;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #2f5f35;
      flex-wrap: wrap;
    }

    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
      cursor: pointer;
    }

    nav a:hover {
      background: #4caf50;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1466692476868-aef1dfb1e735') center/cover;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-shadow: 2px 2px 5px black;
      text-align: center;
    }

    .container {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }

    button {
      background: #3a7d44;
      color: white;
      border: none;
      padding: 8px;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 10px;
    }

    button:hover {
      background: #2f5f35;
    }

    #cartPanel {
      position: fixed;
      right: -350px;
      top: 0;
      width: 300px;
      height: 100%;
      background: white;
      box-shadow: -2px 0 10px rgba(0,0,0,0.2);
      padding: 20px;
      transition: 0.3s;
      overflow-y: auto;
    }

    #cartPanel.open { right: 0; }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .remove {
      background: red;
      color: white;
      border: none;
      padding: 3px 6px;
      border-radius: 4px;
      cursor: pointer;
    }

    #checkout {
      margin-top: 20px;
      border-top: 1px solid #ccc;
      padding-top: 10px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    .payBtn {
      background: #0070ba;
    }

    #adminPanel, #loginPanel {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    #adminPanel { display:none; }
  </style>
</head>
<body>

<header>
  <h1>Roots & Shoots Nursery</h1>
  <p>Growing a greener tomorrow</p>
  <div id="cartBtn" onclick="toggleCart()">Cart (<span id="count">0</span>)</div>
</header>

<nav>
  <a onclick="scrollToShop()">Shop</a>
  <a onclick="toggleAdmin()">Admin</a>
</nav>

<section class="hero">
  <div>
    <h2>Buy Healthy Plants Online</h2>
  </div>
</section>

<div class="container">

  <h2>Shop Plants</h2>
  <div class="cards" id="productList"></div>

  <div id="loginPanel">
    <h2>Admin Login</h2>
    <input id="user" placeholder="Username" />
    <input id="pass" type="password" placeholder="Password" />
    <button onclick="login()">Login</button>
  </div>

  <div id="adminPanel">
    <h2>Admin Panel - Add Plants</h2>
    <input id="name" placeholder="Plant Name" />
    <input id="price" placeholder="Price" />
    <input id="image" placeholder="Image URL" />
    <button onclick="addProduct()">Add Product</button>
    <button onclick="logout()" style="background:red">Logout</button>
  </div>

</div>

<div id="cartPanel">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <h3>Total: £<span id="total">0</span></h3>

  <div id="checkout">
    <h3>Checkout (Mock Stripe)</h3>
    <input placeholder="Card Number" />
    <input placeholder="Expiry" />
    <input placeholder="CVC" />
    <button class="payBtn" onclick="payNow()">Pay Now</button>
  </div>
</div>

<script>

let isAdmin = false;

let products = [
  {name:"rocket cultivated", price:2, image:"https://cdn.diygarden.co.uk/wp-content/uploads/2021/07/shutterstock_760063117.jpg"},
  {name:"red lettuce salad bowl", price:"2.50", image:"https://bentleyseeds.com/cdn/shop/files/shutterstock_22360084-red-salad-bowl-lettuce.jpg?v=1747665051&width=2000"},
  {name:"carrot nantes 2", price:"3.50", image:"https://www.gardenersdream.co.uk/cdn/shop/files/00-GardenersDream-Seeds-Carrot-Early-Nantes-2.jpg?v=1761916647"}
];

let cart = [];

function renderProducts(){
  let list = document.getElementById('productList');
  list.innerHTML='';
  products.forEach((p,i)=>{
    list.innerHTML += `<div class="card"><img src="${p.image}"/><h3>${p.name}</h3><p>£${p.price}</p><button onclick="addItem(${i})">Add to Cart</button></div>`;
  });
}

function addItem(i){ cart.push(products[i]); updateCart(); }
function removeItem(i){ cart.splice(i,1); updateCart(); }

function updateCart(){
  let div=document.getElementById('cartItems');
  let total=0;
  div.innerHTML='';

  cart.forEach((c,i)=>{
    total+=c.price;
    div.innerHTML+=`<div class='cart-item'>${c.name} £${c.price} <button class='remove' onclick='removeItem(${i})'>X</button></div>`;
  });

  document.getElementById('count').innerText=cart.length;
  document.getElementById('total').innerText=total;
}

function toggleCart(){ document.getElementById('cartPanel').classList.toggle('open'); }

function payNow(){ alert("Payment Successful (Mock Stripe)"); cart=[]; updateCart(); toggleCart(); }

function login(){
  let u=document.getElementById('user').value;
  let p=document.getElementById('pass').value;

  if(u==='admin' && p==='1234'){
    isAdmin=true;
    document.getElementById('adminPanel').style.display='block';
    document.getElementById('loginPanel').style.display='none';
    alert('Logged in as admin');
  } else alert('Wrong login');
}

function logout(){
  isAdmin=false;
  document.getElementById('adminPanel').style.display='none';
  document.getElementById('loginPanel').style.display='block';
}

function addProduct(){
  if(!isAdmin) return;

  products.push({
    name:document.getElementById('name').value,
    price:parseFloat(document.getElementById('price').value),
    image:document.getElementById('image').value
  });

  renderProducts();
}

function scrollToShop(){ document.getElementById('productList').scrollIntoView({behavior:'smooth'}); }

function toggleAdmin(){ document.getElementById('loginPanel').scrollIntoView({behavior:'smooth'}); }

renderProducts();

</script>

</body>
</html>
