   <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;

    /* Top bar */
    .top-bar {
      position: sticky;
      top: 0;
      background: #111;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      z-index: 1000;
    }

    .top-bar-inner {
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .logo {
      position: absolute;
      left: 0;
      background: white;
      color: black;
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 6px;
      text-decoration: none;
    }

    /* Buttons */
    .top-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .large-button {
      padding: 14px 28px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      background-color: #111;
      border-radius: 8px;
      text-decoration: none;
      transition: background-color 0.25s ease, transform 0.12s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    }

    .large-button:hover {
      background-color: #004F00;
      transform: translateY(-2px);
    }

    /* Layout */
    .container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: 20px auto;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    .card img {
      width: 100%;
      display: block;
    }

    .card-content {
      padding: 15px;
    }

    .side-news .card {
      margin-bottom: 15px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        padding: 12px;
      }
      .logo {
        display: none;
      }
      .large-button {
        padding: 12px 18px;
        font-size: 16px;
      }
    }
  </style>
