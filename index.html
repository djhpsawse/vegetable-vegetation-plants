<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Shop</title>

<style>
:root{
  --green:#3a7d44;
  --dark:#2f5f35;
  --bg:#f4f9f4;
  --danger:#d62828;
  --warn:#f4a261;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
}

/* HEADER */
header{
  background:var(--green);
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.pill{
  background:#fff;
  padding:10px 15px;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
  color:#333;
}

/* HERO */
.hero{
  padding:40px;
  text-align:center;
  color:#fff;
  background:url("https://images.unsplash.com/photo-1466692476868-aef1dfb1e735") center/cover;
}

/* CONTROLS */
.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  padding:20px;
}

input,select{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* CATEGORY */
.categories{
  padding:0 20px;
}
.categories button{
  margin:5px;
  padding:8px 14px;
  border-radius:20px;
  border:1px solid var(--green);
  background:#fff;
  cursor:pointer;
}
.categories .active{
  background:var(--green);
  color:#fff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:15px;
  padding:15px;
  text-align:center;
  box-shadow:0 4px 15px rgba(0,0,0,.1);
  transition:.3s;
  position:relative;
}
.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

/* BADGES */
.badge{
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 10px;
  border-radius:10px;
  color:#fff;
  font-size:12px;
}
.out{background:var(--danger);}
.low{background:var(--warn);}

/* BUTTON */
.btn{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:5px;
}
.green{background:var(--green);color:#fff;}
.grey{background:#ccc;}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal-content{
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

/* ADMIN */
.admin{display:none;padding:20px;}
.admin input{display:block;margin:5px 0;}

</style>
</head>

<body>

<header>
  <h2>🌿 Plant Shop</h2>
  <div>
    <a class="pill" href="https://forms.office.com/r/yBedHrsQ1n" target="_blank">Order Online</a>
    <button class="pill" onclick="login()">Admin</button>
  </div>
</header>

<div class="hero">
  <h1>Fresh Plants & Seeds</h1>
</div>

<div id="shop">

<div class="controls">
  <input id="search" placeholder="Search...">
  <select id="sort">
    <option value="name">Name</option>
    <option value="price">Price</option>
  </select>
</div>

<div class="categories" id="cats"></div>
<div class="grid" id="grid"></div>

</div>

<!-- ADMIN -->
<div class="admin" id="admin">
<h2>Admin Panel</h2>

<input id="n" placeholder="Name">
<input id="p" placeholder="Price">
<input id="c" placeholder="Category">
<input id="i" placeholder="Image URL">
<input id="s" placeholder="Stock number">

<button onclick="add()">Add</button>

<div id="adminList"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
const PASS="admin123";
const KEY="plants_v3";
const FORM="https://forms.office.com/r/yBedHrsQ1n";

let products=JSON.parse(localStorage.getItem(KEY))||[
{id:1,name:"Tomato",price:2.5,cat:"Vegetables",img:"https://images.unsplash.com/photo-1592928302636-c83cf1a3a9f4",stock:10,desc:"Juicy tomatoes"},
{id:2,name:"Carrot",price:3,cat:"Roots",img:"https://images.unsplash.com/photo-1582515073490-dc6a7a66b3c3",stock:2,desc:"Crunchy carrots"}
];

let currentCat="All";

function save(){localStorage.setItem(KEY,JSON.stringify(products));}

/* FILTERS */
function renderCats(){
  const cats=["All",...new Set(products.map(p=>p.cat))];
  const el=document.getElementById("cats");
  el.innerHTML="";
  cats.forEach(c=>{
    const b=document.createElement("button");
    b.textContent=c;
    if(c===currentCat)b.classList.add("active");
    b.onclick=()=>{currentCat=c;render();};
    el.appendChild(b);
  });
}

/* SHOP */
function render(){
  renderCats();
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let list=[...products];

  const search=document.getElementById("search").value.toLowerCase();
  list=list.filter(p=>p.name.toLowerCase().includes(search));
  if(currentCat!=="All")list=list.filter(p=>p.cat===currentCat);

  if(document.getElementById("sort").value==="price"){
    list.sort((a,b)=>a.price-b.price);
  } else {
    list.sort((a,b)=>a.name.localeCompare(b.name));
  }

  list.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";

    let badge="";
    if(p.stock===0) badge='<div class="badge out">Out of stock</div>';
    else if(p.stock<5) badge='<div class="badge low">Low stock</div>';

    div.innerHTML=`
      ${badge}
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>£${p.price}</p>
      <button class="btn green">View</button>
      <a href="${FORM}" target="_blank">
        <button class="btn ${p.stock? 'green':'grey'}" ${!p.stock?'disabled':''}>
          Order
        </button>
      </a>
    `;

    div.querySelector(".green").onclick=()=>show(p);
    grid.appendChild(div);
  });
}

/* MODAL */
function show(p){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML=`
    <h2>${p.name}</h2>
    <img src="${p.img}" style="width:100%">
    <p>${p.desc}</p>
    <p><b>£${p.price}</b></p>
    <button onclick="closeModal()">Close</button>
  `;
}
function closeModal(){document.getElementById("modal").style.display="none";}

/* ADMIN */
function login(){
  const pw=prompt("Enter password:");
  if(pw===PASS){
    document.getElementById("shop").style.display="none";
    document.getElementById("admin").style.display="block";
    renderAdmin();
  }
}

function add(){
  products.push({
    id:Date.now(),
    name:n.value,
    price:+p.value,
    cat:c.value,
    img:i.value,
    stock:+s.value,
    desc:"New plant"
  });
  save();render();renderAdmin();
}

function renderAdmin(){
  const el=document.getElementById("adminList");
  el.innerHTML="";
  products.forEach(p=>{
    const d=document.createElement("div");
    d.innerHTML=`
      ${p.name} (${p.stock})
      <button onclick="del(${p.id})">Delete</button>
    `;
    el.appendChild(d);
  });
}

function del(id){
  products=products.filter(p=>p.id!==id);
  save();render();renderAdmin();
}

/* INIT */
render();
</script>

</body>
</html>
