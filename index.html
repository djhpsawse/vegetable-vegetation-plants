<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vegetable, Vegetation &amp; Plants – Stock</title>

  <style>
    :root{
      --green:#3a7d44;
      --dark:#2f5f35;
      --bg:#f4f9f4;
      --danger:#d62828;
      --warn:#f4a261;
      --ink:#17301a;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:var(--bg);
      color:var(--ink);
    }

    header{
      background:var(--green);
      color:#fff;
      padding:14px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
    }
    header h2{margin:0;font-size:18px}

    .pill, .order-button{
      background:#fff;
      padding:10px 14px;
      border-radius:999px;
      font-weight:800;
      border:none;
      text-decoration:none;
      color:#333;
      cursor:pointer;
    }
    .order-button:hover{filter:brightness(.95)}

    .hero{
      padding:48px 18px;
      text-align:center;
      color:#fff;
      background:url("https://raw.githubusercontent.com/djhpsawse/vegetable-vegetation-plants/main/Designer.png") center/cover;
    }
    .hero h1{margin:0;font-size:34px;text-shadow:0 2px 18px rgba(0,0,0,.35)}
    .hero p{margin:10px 0 0;text-shadow:0 2px 18px rgba(0,0,0,.35)}

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      padding:18px;
    }
    input,select,textarea{
      padding:10px;
      border-radius:12px;
      border:1px solid #cfd9cf;
      font-size:16px;
      background:#fff;
    }

    .categories{padding:0 18px 10px}
    .categories button{
      margin:5px;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid var(--green);
      background:#fff;
      cursor:pointer;
      font-weight:600;
    }
    .categories .active{background:var(--green);color:#fff}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:18px;
      padding:18px;
    }

    .card{
      background:#fff;
      border-radius:18px;
      padding:14px;
      text-align:center;
      box-shadow:0 6px 18px rgba(0,0,0,.10);
      position:relative;
    }
    .card img{
      width:100%;
      height:155px;
      object-fit:cover;
      border-radius:12px;
      background:#eef4ee;
    }

    .stock-badge{
      position:absolute;
      top:12px;
      left:12px;
      padding:5px 10px;
      border-radius:999px;
      color:#fff;
      font-size:12px;
      font-weight:800;
    }
    .out{background:var(--danger)}
    .low{background:var(--warn);color:#2d1b00}

    .btn{
      padding:10px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      width:100%;
      font-weight:800;
      margin-top:8px;
    }
    .dark{background:var(--dark);color:#fff}
    .grey{background:#ddd}

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:50;
    }
    .modal-content{
      background:#fff;
      padding:16px;
      border-radius:18px;
      width:100%;
      max-width:520px;
      max-height:85vh;
      overflow:auto;
    }

    .admin{display:none;padding:18px}
    .panel{
      background:#fff;
      border-radius:18px;
      padding:14px;
      box-shadow:0 6px 18px rgba(0,0,0,.10);
    }
    .admin-list-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid #eee;
      padding:10px 0;
      gap:10px;
    }
    .admin-list-item button{
      padding:8px 10px;
      border-radius:10px;
      border:1px solid #cfe2cf;
      background:#fff;
      cursor:pointer;
      font-weight:800;
    }
  </style>
</head>

<body>
  <header>
    <h2>Vegetable, Vegetation &amp; Plants</h2>
    <div>
      <a href="https://forms.office.com/r/yBedHrsQ1n" class="order-button" target="_blank" rel="noreferrer">Order Online</a>
      <span class="pill">Inventory</span>
      <button class="pill" type="button" onclick="login()">Admin</button>
    </div>
  </header>

  <div class="hero">
    <h1>Live Plant Stock</h1>
    <p>Browse plants and manage live inventory levels.</p>
  </div>

  <div id="shop">
    <div class="controls">
      <input id="search" placeholder="Search plants..." />
      <select id="sort">
        <option value="name">Sort by name</option>
        <option value="price">Sort by price</option>
      </select>
    </div>

    <div class="categories" id="cats"></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="admin" id="admin">
    <h2>Admin – Stock Control</h2>

    <div class="panel">
      <input id="n" placeholder="Name" />
      <input id="p" placeholder="Price (£)" type="number" step="0.01" />
      <input id="c" placeholder="Category" />
      <input id="s" placeholder="Stock" type="number" />
      <input id="i" placeholder="Image URL" />
      <textarea id="d" placeholder="Description" rows="3"></textarea>

      <button class="btn dark" type="button" onclick="addProduct()">Add Product</button>
      <div id="adminProductList"></div>
    </div>

    <button class="btn grey" type="button" onclick="logout()">Exit Admin</button>
  </div>

  <div class="modal" id="productModal"
       onclick="if(event.target.id==='productModal') this.style.display='none'">
    <div class="modal-content" id="productModalContent"></div>
  </div>

  <script>
    // ===== Settings =====
    const PASS = "admin123";                // demo-only (client side)
    const KEY  = "plants_products_stock";   // localStorage key

    // ===== Default data =====
    const defaults = [
      {id:1,  name:"rocket (cultivated)",          price:2.00, category:"Salad",      stock:10, image:"https://premierseedsdirect.com/wp-content/uploads/2017/12/Rocket-Cultivated-2-021225-iStock-SQ-PS-1024x1024.jpg", desc:"Peppery salad leaf. Quick to grow."},
      {id:2,  name:"red lettuce (salad bowl)",     price:2.50, category:"Salad",      stock:10, image:"https://www.harrisseeds.com/cdn/shop/files/01527_900x.jpg?v=1736905903", desc:"Loose-leaf lettuce with rich colour."},
      {id:3,  name:"carrot (Nantes 2)",            price:3.50, category:"Roots",      stock:10, image:"https://gardenerspath.com/wp-content/uploads/2025/01/Carrots-Ready-to-Harvest-in-the-Garden-2.jpg", desc:"Sweet carrots, great for early harvest."},
      {id:4,  name:"tomato (agura)",               price:2.00, category:"Salad",      stock:10, image:"https://media.istockphoto.com/id/512694992/photo/young-tomato-plant-growing-tomato-in-garden.jpg?s=170667a&w=0&k=20&c=2uXN2qMYOR1ZIuG1lQYFQZyGTN4CTLzaPHSL16JCsXY=", desc:"Strong tomato plant starter."},
      {id:5,  name:"spinach (perpetual)",          price:2.50, category:"Salad",      stock:10, image:"https://premierseedsdirect.com/wp-content/uploads/2017/02/41579623-2.jpg", desc:"Harvest again and again."},
      {id:6,  name:"tomato (idyll)",               price:2.50, category:"Salad",      stock:10, image:"https://www.jungepflanzen.de/media/5d/2c/99/1701199480/solanum_lycopersicum_idyll_1.jpg?ts=1701199480", desc:"Reliable tomato variety for the garden."},
      {id:7,  name:"chives",                       price:2.00, category:"Herbs",      stock:10, image:"https://images.unsplash.com/photo-1524592911903-1f3b0b5a59f5?auto=format&fit=crop&w=1200&q=60", desc:"Great for salads and garnish."},
      {id:8,  name:"sorrel (garden)",              price:2.50, category:"Herbs",      stock:10, image:"https://www.epicgardening.com/wp-content/uploads/2023/02/sorrel-plant-1200x667.jpeg", desc:"Lemony leaf – perfect in soups."},
      {id:9,  name:"cauliflower (all season)",     price:2.50, category:"Salad",      stock:10, image:"https://growplant.org/wp-content/uploads/2024/11/cauliflower-life-cycle-2.jpg", desc:"All-season cauliflower starter."},
      {id:10, name:"french bean (Ferrari)",        price:2.00, category:"Beans",      stock:10, image:"https://tse1.mm.bing.net/th/id/OIP.NJpdve2n7PrUuPxgwucMTAHaHa?rs=1&pid=ImgDetMain&o=7&rm=3&adlt=strict", desc:"Productive bean variety."},
      {id:11, name:"broccoli (Calabrese)",         price:2.50, category:"Salad",      stock:10, image:"https://cdn.mos.cms.futurecdn.net/nKLHEVorF7WApKVeKUrr7C-690-80.jpg", desc:"Classic broccoli type."},
      {id:12, name:"beetroot (Detroit)",           price:2.00, category:"Roots",      stock:10, image:"https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&w=1200&q=60", desc:"Great for roasting and salads."},
      {id:13, name:"swiss chard (mixed)",          price:3.00, category:"Salad",      stock:10, image:"https://images.unsplash.com/photo-1584270354949-1f5a3a8f1e3b?auto=format&fit=crop&w=1200&q=60", desc:"Colourful stems, easy to grow."},
      {id:14, name:"carrot (Cosmic purple)",       price:2.50, category:"Roots",      stock:10, image:"https://images.unsplash.com/photo-1560807707-8cc77767d783?auto=format&fit=crop&w=1200&q=60", desc:"Purple carrot – eye-catching and tasty."},
      {id:15, name:"curly kale (Nero Di Toscana)", price:3.00, category:"Salad",      stock:10, image:"https://images.unsplash.com/photo-1587049352846-4a1a278e6b76?auto=format&fit=crop&w=1200&q=60", desc:"Hardy kale, great for winter."},
      {id:16, name:"parsley",                      price:2.50, category:"Herbs",      stock:10, image:"https://images.unsplash.com/photo-1587731556938-38755b4803a6?auto=format&fit=crop&w=1200&q=60", desc:"Fresh herb staple for cooking."},
      {id:17, name:"cabbage (brunswick)",          price:3.00, category:"Salad",      stock:10, image:"https://images.unsplash.com/photo-1518977956815-dee0064f6a5a?auto=format&fit=crop&w=1200&q=60", desc:"Classic cabbage variety."},
      {id:18, name:"basil (genovese)",             price:2.50, category:"Herbs",      stock:10, image:"https://images.unsplash.com/photo-1515586838455-8f8f940d6853?auto=format&fit=crop&w=1200&q=60", desc:"Sweet basil for sauces and salads."},
      {id:19, name:"mixed herb seeds",             price:2.20, category:"Seeds",      stock:10, image:"https://images.unsplash.com/photo-1457530378978-8bac673b8062?auto=format&fit=crop&w=1200&q=60", desc:"Mixed herb seed pack."},
      {id:20, name:"starter gift box",             price:9.99, category:"Gift Boxes", stock:10, image:"https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1200&q=60", desc:"A lovely starter bundle as a gift."}
    ];

    // ===== State =====
    let products = JSON.parse(localStorage.getItem(KEY)) || defaults;
    let currentCat = "All";

    // ===== Element refs (avoid relying on implicit globals) =====
    const shop  = document.getElementById("shop");
    const admin = document.getElementById("admin");
    const searchEl = document.getElementById("search");
    const sortEl   = document.getElementById("sort");
    const catsEl   = document.getElementById("cats");
    const gridEl   = document.getElementById("grid");

    const nEl = document.getElementById("n");
    const pEl = document.getElementById("p");
    const cEl = document.getElementById("c");
    const sEl = document.getElementById("s");
    const iEl = document.getElementById("i");
    const dEl = document.getElementById("d");
    const adminListEl = document.getElementById("adminProductList");

    const productModal = document.getElementById("productModal");
    const productModalContent = document.getElementById("productModalContent");

    function save(){
      localStorage.setItem(KEY, JSON.stringify(products));
    }
    function money(n){
      return "£" + Number(n).toFixed(2);
    }

    function renderCats(){
      catsEl.innerHTML = "";
      const allCats = ["All", ...new Set(products.map(p => p.category).filter(Boolean))];
      allCats.forEach(cat => {
        const b = document.createElement("button");
        b.textContent = cat;
        if(cat === currentCat) b.classList.add("active");
        b.onclick = () => { currentCat = cat; render(); };
        catsEl.appendChild(b);
      });
    }

    function openProduct(p){
      productModalContent.innerHTML = `
        <h2>${p.name}</h2>
        <img src="${p.image}" alt="${p.name}" style="width:100%;border-radius:12px">
        <p>${p.desc || ""}</p>
        <p><b>${money(p.price)}</b> • Stock: ${p.stock}</p>
        <button class="btn grey" type="button" onclick="document.getElementById('productModal').style.display='none'">Close</button>
      `;
      productModal.style.display = "flex";
    }

    function render(){
      renderCats();
      gridEl.innerHTML = "";

      let list = [...products];
      const q = searchEl.value.trim().toLowerCase();
      if(q) list = list.filter(p => p.name.toLowerCase().includes(q));
      if(currentCat !== "All") list = list.filter(p => p.category === currentCat);

      list.sort(sortEl.value === "price"
        ? (a,b) => a.price - b.price
        : (a,b) => a.name.localeCompare(b.name)
      );

      list.forEach(p => {
        const d = document.createElement("div");
        d.className = "card";

        const badge = p.stock === 0
          ? `<div class="stock-badge out">Out</div>`
          : (p.stock < 5 ? `<div class="stock-badge low">Low</div>` : "");

        d.innerHTML = `
          ${badge}
          <img src="${p.image}" alt="${p.name}">
          <h3>${p.name}</h3>
          <p>${money(p.price)} • Stock: <b>${p.stock}</b></p>
          <button class="btn dark" type="button">View</button>
        `;
        d.querySelector("button").onclick = () => openProduct(p);
        gridEl.appendChild(d);
      });

      save();
    }

    // ===== Admin =====
    window.login = function login(){
      if(prompt("Admin password") === PASS){
        shop.style.display = "none";
        admin.style.display = "block";
        renderAdmin();
      }
    }

    window.logout = function logout(){
      admin.style.display = "none";
      shop.style.display = "block";
      render();
    }

    window.addProduct = function addProduct(){
      const name = nEl.value.trim();
      const price = Number(pEl.value);
      const category = (cEl.value || "Other").trim();
      const stock = Number(sEl.value || 0);
      const image = iEl.value.trim();
      const desc  = dEl.value.trim();

      if(!name || !Number.isFinite(price)){
        alert("Please enter a product name and a valid price.");
        return;
      }

      products.push({
        id: String(Date.now()),
        name,
        price,
        category,
        stock: Number.isFinite(stock) ? stock : 0,
        image,
        desc
      });

      [nEl,pEl,cEl,sEl,iEl,dEl].forEach(x => x.value = "");
      renderAdmin();
      render();
    }

    function renderAdmin(){
      adminListEl.innerHTML = "";
      products.forEach(prod => {
        const row = document.createElement("div");
        row.className = "admin-list-item";
        row.innerHTML = `
          <div>
            <b>${prod.name}</b><br>
            <small>${prod.category} • Stock: ${prod.stock}</small>
          </div>
        `;

        const actions = document.createElement("div");
        ["−","+","Delete"].forEach(label => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = label;
          btn.onclick = () => {
            if(label === "−") prod.stock = Math.max(0, Number(prod.stock) - 1);
            if(label === "+") prod.stock = Number(prod.stock) + 1;
            if(label === "Delete") products = products.filter(x => x.id !== prod.id);
            renderAdmin();
            render();
          };
          actions.appendChild(btn);
        });

        row.appendChild(actions);
        adminListEl.appendChild(row);
      });
      save();
    }

    // ===== Events =====
    searchEl.addEventListener("input", render);
    sortEl.addEventListener("change", render);

    // Initial render
    render();
  </script>
</body>
</html>
