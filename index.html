<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vegetable, vegetation, & plants</title>

<style>
:root{
  --green:#3a7d44;
  --dark:#2f5f35;
  --bg:#f4f9f4;
  --danger:#d62828;
  --warn:#f4a261;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
}

/* HEADER */
header{
  background:var(--green);
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.pill{
  background:#fff;
  padding:10px 15px;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
  color:#333;
}

/* HERO */
.hero{
  padding:40px;
  text-align:center;
  color:#fff;
  background:url("https://images.unsplash.com/photo-1466692476868-aef1dfb1e735") center/cover;
}

/* CONTROLS */
.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  padding:20px;
}

input,select{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* CATEGORY */
.categories{
  padding:0 20px;
}
.categories button{
  margin:5px;
  padding:8px 14px;
  border-radius:20px;
  border:1px solid var(--green);
  background:#fff;
  cursor:pointer;
}
.categories .active{
  background:var(--green);
  color:#fff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:15px;
  padding:15px;
  text-align:center;
  box-shadow:0 4px 15px rgba(0,0,0,.1);
  transition:.3s;
  position:relative;
}
.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

/* BADGES */
.badge{
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 10px;
  border-radius:10px;
  color:#fff;
  font-size:12px;
}
.out{background:var(--danger);}
.low{background:var(--warn);}

/* BUTTON */
.btn{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:5px;
}
.green{background:var(--green);color:#fff;}
.grey{background:#ccc;}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal-content{
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

/* ADMIN */
.admin{display:none;padding:20px;}
.admin input{display:block;margin:5px 0;}

</style>
</head>

<body>

<header>
  <h2>Vegetable, vegetation, & plants</h2>
  <div>
    <a class="pill" href="https://forms.office.com/r/yBedHrsQ1n" target="_blank">Order Online</a>
    <button class="pill" onclick="login()">Admin</button>
  </div>
</header>

<div class="hero">
  <h1>Fresh Plants & Seeds</h1>
</div>

<div id="shop">

<div class="controls">
  <input id="search" placeholder="Search...">
  <select id="sort">
    <option value="name">Name</option>
    <option value="price">Price</option>
  </select>
</div>

<div class="categories" id="cats"></div>
<div class="grid" id="grid"></div>

</div>

<!-- ADMIN -->
<div class="admin" id="admin">
<h2>Admin Panel</h2>

<input id="n" placeholder="Name">
<input id="p" placeholder="Price">
<input id="c" placeholder="Category">
<input id="i" placeholder="Image URL">
<input id="s" placeholder="Stock number">

<button onclick="add()">Add</button>

<div id="adminList"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
const PASS="admin123";
const KEY="plants_v3";
const FORM="https://forms.office.com/r/yBedHrsQ1n";

let products=JSON.parse(localStorage.getItem(KEY))||[
    {id:1,  name:"rocket (cultivated)",          price:2.00, category:"Salad",      image:"https://premierseedsdirect.com/wp-content/uploads/2017/12/Rocket-Cultivated-2-021225-iStock-SQ-PS-1024x1024.jpg"},
    {id:2,  name:"red lettuce (salad bowl)",     price:2.50, category:"Salad",      image:"https://www.harrisseeds.com/cdn/shop/files/01527_900x.jpg?v=1736905903"},
    {id:3,  name:"carrot (Nantes 2)",            price:3.50, category:"Roots",      image:"https://gardenerspath.com/wp-content/uploads/2025/01/Carrots-Ready-to-Harvest-in-the-Garden-2.jpg"},
    {id:4,  name:"tomato (agura)",               price:2.00, category:"Salad",      image:"https://media.istockphoto.com/id/512694992/photo/young-tomato-plant-growing-tomato-in-garden.jpg?s=170667a&w=0&k=20&c=2uXN2qMYOR1ZIuG1lQYFQZyGTN4CTLzaPHSL16JCsXY="},
    {id:5,  name:"spinach (perpetual)",          price:2.50, category:"Salad",      image:"https://premierseedsdirect.com/wp-content/uploads/2017/02/41579623-2.jpg"},
    {id:6,  name:"tomato (idyll)",               price:2.50, category:"Salad",      image:"https://www.jungepflanzen.de/media/5d/2c/99/1701199480/solanum_lycopersicum_idyll_1.jpg?ts=1701199480"},
    {id:7,  name:"chives",                       price:2.00, category:"Herbs",      image:"https://images.unsplash.com/photo-1524592911903-1f3b0b5a59f5?auto=format&fit=crop&w=1200&q=60"},
    {id:8,  name:"sorrel (garden)",              price:2.50, category:"Herbs",      image:"https://www.epicgardening.com/wp-content/uploads/2023/02/sorrel-plant-1200x667.jpeg"},
    {id:9,  name:"cauliflower (all season)",     price:2.50, category:"Salad",      image:"https://growplant.org/wp-content/uploads/2024/11/cauliflower-life-cycle-2.jpg"},
    {id:10, name:"french bean (Ferrari)",        price:2.00, category:"Beans",      image:"https://images.unsplash.com/photo-1598032895397-b9472444bf93?auto=format&fit=crop&w=1200&q=60"},
    {id:11, name:"broccoli (Calabrese)",         price:2.50, category:"Salad",      image:"https://images.unsplash.com/photo-1582515073490-dc84e2060b44?auto=format&fit=crop&w=1200&q=60"},
    {id:12, name:"beetroot (Detroit)",           price:2.00, category:"Roots",      image:"https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&w=1200&q=60"},
    {id:13, name:"swiss chard (mixed)",          price:3.00, category:"Salad",      image:"https://images.unsplash.com/photo-1584270354949-1f5a3a8f1e3b?auto=format&fit=crop&w=1200&q=60"},
    {id:14, name:"carrot (Cosmic purple)",       price:2.50, category:"Roots",      image:"https://images.unsplash.com/photo-1560807707-8cc77767d783?auto=format&fit=crop&w=1200&q=60"},
    {id:15, name:"curly kale (Nero Di Toscana)", price:3.00, category:"Salad",      image:"https://images.unsplash.com/photo-1587049352846-4a1a278e6b76?auto=format&fit=crop&w=1200&q=60"},
    {id:16, name:"parsley",                      price:2.50, category:"Herbs",      image:"https://images.unsplash.com/photo-1587731556938-38755b4803a6?auto=format&fit=crop&w=1200&q=60"},
    {id:17, name:"cabbage (brunswick)",          price:3.00, category:"Salad",      image:"https://images.unsplash.com/photo-1518977956815-dee0064f6a5a?auto=format&fit=crop&w=1200&q=60"},
    {id:18, name:"basil (genovese)",             price:2.50, category:"Herbs",      image:"https://images.unsplash.com/photo-1515586838455-8f8f940d6853?auto=format&fit=crop&w=1200&q=60"},
    {id:19, name:"mixed herb seeds",             price:2.20, category:"Seeds",      image:"https://images.unsplash.com/photo-1457530378978-8bac673b8062?auto=format&fit=crop&w=1200&q=60"},
    {id:20, name:"starter gift box",             price:9.99, category:"Gift Boxes", image:"https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1200&q=60"}
];

let currentCat="All";

function save(){localStorage.setItem(KEY,JSON.stringify(products));}

/* FILTERS */
function renderCats(){
  const cats=["All",...new Set(products.map(p=>p.cat))];
  const el=document.getElementById("cats");
  el.innerHTML="";
  cats.forEach(c=>{
    const b=document.createElement("button");
    b.textContent=c;
    if(c===currentCat)b.classList.add("active");
    b.onclick=()=>{currentCat=c;render();};
    el.appendChild(b);
  });
}

/* SHOP */
function render(){
  renderCats();
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let list=[...products];

  const search=document.getElementById("search").value.toLowerCase();
  list=list.filter(p=>p.name.toLowerCase().includes(search));
  if(currentCat!=="All")list=list.filter(p=>p.cat===currentCat);

  if(document.getElementById("sort").value==="price"){
    list.sort((a,b)=>a.price-b.price);
  } else {
    list.sort((a,b)=>a.name.localeCompare(b.name));
  }

  list.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";

    let badge="";
    if(p.stock===0) badge='<div class="badge out">Out of stock</div>';
    else if(p.stock<5) badge='<div class="badge low">Low stock</div>';

    div.innerHTML=`
      ${badge}
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>£${p.price}</p>
      <button class="btn green">View</button>
      <a href="${FORM}" target="_blank">
        <button class="btn ${p.stock? 'green':'grey'}" ${!p.stock?'disabled':''}>
          Order
        </button>
      </a>
    `;

    div.querySelector(".green").onclick=()=>show(p);
    grid.appendChild(div);
  });
}

/* MODAL */
function show(p){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML=`
    <h2>${p.name}</h2>
    <img src="${p.img}" style="width:100%">
    <p>${p.desc}</p>
    <p><b>£${p.price}</b></p>
    <button onclick="closeModal()">Close</button>
  `;
}
function closeModal(){document.getElementById("modal").style.display="none";}

/* ADMIN */
function login(){
  const pw=prompt("Enter password:");
  if(pw===PASS){
    document.getElementById("shop").style.display="none";
    document.getElementById("admin").style.display="block";
    renderAdmin();
  }
}

function add(){
  products.push({
    id:Date.now(),
    name:n.value,
    price:+p.value,
    cat:c.value,
    img:i.value,
    stock:+s.value,
    desc:"New plant"
  });
  save();render();renderAdmin();
}

function renderAdmin(){
  const el=document.getElementById("adminList");
  el.innerHTML="";
  products.forEach(p=>{
    const d=document.createElement("div");
    d.innerHTML=`
      ${p.name} (${p.stock})
      <button onclick="del(${p.id})">Delete</button>
    `;
    el.appendChild(d);
  });
}

function del(id){
  products=products.filter(p=>p.id!==id);
  save();render();renderAdmin();
}

/* INIT */
render();
</script>

</body>
</html>
